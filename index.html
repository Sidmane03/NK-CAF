<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Nikhil's Kitchen — Pav Bhaji, Cafe &amp; Catering in Ravet, Pune</title>
    <meta

      content="Nikhil's Kitchen — Authentic Pav Bhaji, Burgers, Mojitos &amp; Cafe classics in Ravet, Pune. Order online via Zomato &amp; Swiggy, or place bulk orders for events."
    />

    <!-- TODO: replace YOUR_DOMAIN with your actual production domain -->
    <link rel="canonical" href="https://YOUR_DOMAIN/"/>

    <!-- Open Graph -->
    <meta property="og:site_name" content="Nikhil's Kitchen" />

    <meta property="og:type" content="restaurant" />
    <meta property="og:title" content="Nikhil's Kitchen — Pav Bhaji, Cafe &amp; Catering in Ravet, Pune" />

    <meta property="og:image" content="https://YOUR_DOMAIN/og-image.jpg" />

    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
